<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UXZ header-nav-rich</title>
<link rel="stylesheet" href="../../tokens.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="uxz-header-rich">
    <a class="uxz-header-rich__brand" href="/" aria-label="Zomato home">
      <img src="../../assets/images/b40b97e677bc7b2ca77c58c61db266fe1603954218.png" alt="Zomato" height="32">
    </a>
    <div class="uxz-header-rich__search">
      <div class="uxz-header-rich__location">
        <img src="../../assets/icons/location.svg" alt="">
        <input type="text" value="Ywca, Ashoka Rd, Connaught Place, New Delhi" aria-label="Delivery location">
        <img class="uxz-header-rich__chev" src="../../assets/icons/chevron-down.svg" alt="">
      </div>
      <div class="uxz-header-rich__divider"></div>
      <div class="uxz-header-rich__query">
        <img src="../../assets/icons/search.svg" alt="">
        <input type="text" placeholder="Search for restaurant, cuisine or a dish" aria-label="Search">
      </div>
    </div>
    <nav class="uxz-header-rich__auth" aria-label="Account">
      <a href="#login">Log in</a>
      <a href="#signup">Sign up</a>
    </nav>
  </header>
</body>
</html>
