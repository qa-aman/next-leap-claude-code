<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UXZ restaurant-card</title>
<link rel="stylesheet" href="../../tokens.css">
<link rel="stylesheet" href="../rating-chip/style.css">
<link rel="stylesheet" href="../price-tag/style.css">
<link rel="stylesheet" href="./style.css">
</head>
<body style="padding:40px;background:#fff;font-family:Okra,sans-serif;">
  <a class="uxz-restaurant-card" href="/ncr/connaught-club-house-connaught-place-new-delhi/info">
    <div class="uxz-restaurant-card__media">
      <span class="uxz-restaurant-card__promoted">Promoted</span>
      <img class="uxz-restaurant-card__image" src="../../assets/images/1765454758_597b48d3875d7de89778722d.png" alt="">
      <div class="uxz-restaurant-card__offer">
        <img src="../../assets/images/zomato-walkin.png" alt="Zomato Walkin">
        <span>Flat 10% OFF</span>
      </div>
    </div>
    <div class="uxz-restaurant-card__body">
      <div class="uxz-restaurant-card__row">
        <h4 class="uxz-restaurant-card__name">Connaught Club House</h4>
        <span class="uxz-rating-chip" data-tier="green">4.3<img src="../../assets/icons/star-fill.svg" alt=""></span>
      </div>
      <p class="uxz-restaurant-card__cuisines">North Indian, Mughlai, Italian, Continental, Asian, Fast Food, Desserts</p>
      <p class="uxz-price-tag">&#8377;3,000 for two</p>
      <div class="uxz-restaurant-card__foot">
        <p class="uxz-restaurant-card__locality">Connaught Place, New Delhi</p>
        <p class="uxz-restaurant-card__distance">1 km</p>
      </div>
    </div>
  </a>
</body>
</html>
