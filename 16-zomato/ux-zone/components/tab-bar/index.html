<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>UXZ tab-bar</title>
<link rel="stylesheet" href="../../tokens.css">
<link rel="stylesheet" href="./style.css">
</head>
<body style="padding:40px;">
  <div class="uxz-tab-bar" role="tablist">
    <button class="uxz-tab-bar__tab" role="tab" aria-selected="true">
      <span class="uxz-tab-bar__label">Dining Out</span>
    </button>
    <button class="uxz-tab-bar__tab" role="tab" aria-selected="false">
      <span class="uxz-tab-bar__label">Delivery</span>
    </button>
    <button class="uxz-tab-bar__tab" role="tab" aria-selected="false">
      <span class="uxz-tab-bar__label">Nightlife</span>
    </button>
  </div>
</body>
</html>
