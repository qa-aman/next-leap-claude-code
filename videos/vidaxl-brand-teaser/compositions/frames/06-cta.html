<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        @font-face { font-family: "Poppins"; font-weight: 400; font-style: normal; font-display: block; src: url(assets/fonts/Poppins-400.woff2) format("woff2"); }
        @font-face { font-family: "Poppins"; font-weight: 500; font-style: normal; font-display: block; src: url(assets/fonts/Poppins-500.woff2) format("woff2"); }
        @font-face { font-family: "Poppins"; font-weight: 600; font-style: normal; font-display: block; src: url(assets/fonts/Poppins-600.woff2) format("woff2"); }
        @font-face { font-family: "Poppins"; font-weight: 700; font-style: normal; font-display: block; src: url(assets/fonts/Poppins-700.woff2) format("woff2"); }

        #root {
          position: absolute; inset: 0; width: 1080px; height: 1920px; overflow: hidden;
          background: #FBF7F0; font-family: "Poppins", system-ui, sans-serif;
        }
        #root .ground { position: absolute; inset: 0; background: #FBF7F0; }
        #root .bloom {
          position: absolute; left: 50%; top: 300px; width: 900px; height: 900px; margin-left: -450px;
          background: radial-gradient(circle at 50% 50%, rgba(243,208,24,0.55) 0%, rgba(243,208,24,0.18) 40%, rgba(243,208,24,0.0) 66%);
        }
        #root .logo { position: absolute; left: 0; right: 0; top: 620px; text-align: center; }
        #root .logo img { width: 620px; display: inline-block; }
        #root .tagline {
          position: absolute; left: 0; right: 0; top: 872px; text-align: center;
          font-weight: 500; font-size: 44px; color: #420839; opacity: 0.9;
        }
        #root .cta {
          position: absolute; left: 0; right: 0; top: 1010px; text-align: center;
        }
        #root .cta .pill {
          display: inline-block; background: #93117E; color: #FBF7F0;
          font-weight: 600; font-size: 50px; letter-spacing: 0.01em;
          padding: 30px 78px; border-radius: 999px;
          box-shadow: 0 10px 30px rgba(147,17,126,0.28);
        }
        #root .cta .arrow { margin-left: 14px; }
        #root .foot {
          position: absolute; left: 0; right: 0; top: 1200px; text-align: center;
          font-weight: 600; font-size: 30px; letter-spacing: 0.22em; text-transform: uppercase; color: #93117E; opacity: 0.85;
        }
      </style>

      <div id="root" data-composition-id="06-cta" data-width="1080" data-height="1920">
        <div class="ground clip" data-start="0" data-duration="5" data-track-index="0"></div>
        <div class="bloom clip" data-layout-allow-overflow data-start="0" data-duration="5" data-track-index="1"></div>

        <div class="logo clip" data-start="0" data-duration="5" data-track-index="2">
          <img src="assets/brand/vidaxl-logo.svg" alt="vidaXL.co.uk" />
        </div>
        <div class="tagline clip" data-start="0" data-duration="5" data-track-index="3">Everything for your home &amp; garden.</div>
        <div class="cta clip" data-start="0" data-duration="5" data-track-index="4">
          <span class="pill">Shop now<span class="arrow">&rarr;</span></span>
        </div>
        <div class="foot clip" data-start="0" data-duration="5" data-track-index="5">Stylish · Affordable · Delivered</div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.from("#root .bloom", { opacity: 0, scale: 0.8, transformOrigin: "50% 50%", duration: 0.9, ease: "power2.out" }, 0);
        tl.from("#root .logo", { opacity: 0, y: 30, scale: 0.94, transformOrigin: "50% 50%", duration: 0.7, ease: "power3.out" }, 0.2);
        tl.from("#root .tagline", { opacity: 0, y: 18, duration: 0.6, ease: "power2.out" }, 0.9);
        tl.from("#root .cta .pill", { opacity: 0, scale: 0.8, transformOrigin: "50% 50%", duration: 0.6, ease: "back.out(1.8)" }, 1.3);
        tl.from("#root .foot", { opacity: 0, y: 12, duration: 0.5, ease: "power2.out" }, 1.7);
        // final-frame settle + hold: a small, gentle breath on the CTA (allowed on the last frame)
        tl.to("#root .cta .pill", { scale: 1.04, duration: 0.7, ease: "sine.inOut" }, 2.4);
        tl.to("#root .cta .pill", { scale: 1.0, duration: 0.8, ease: "sine.inOut" }, 3.1);
        window.__timelines["06-cta"] = tl;
      </script>
    </template>
  </body>
</html>
