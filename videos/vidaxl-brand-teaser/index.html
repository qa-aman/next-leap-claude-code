<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #FBF7F0;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="27"
      data-width="1080"
      data-height="1920"
    >
      <div
        id="el-01-hook"
        class="scene"
        data-composition-id="01-hook"
        data-composition-src="compositions/frames/01-hook.html"
        data-start="0"
        data-duration="4.6"
        data-track-index="0"
      ></div>
      <audio
        id="el-01-hook-voice"
        src="assets/voice/01.wav"
        data-start="0"
        data-duration="4"
        data-track-index="10"
        data-volume="1"
      ></audio>

      <div
        id="el-02-indoors"
        class="scene"
        data-composition-id="02-indoors"
        data-composition-src="compositions/frames/02-indoors.html"
        data-start="4"
        data-duration="5.6"
        data-track-index="1"
      ></div>
      <audio
        id="el-02-indoors-voice"
        src="assets/voice/02.wav"
        data-start="4"
        data-duration="5"
        data-track-index="10"
        data-volume="1"
      ></audio>

      <div
        id="el-03-outdoors"
        class="scene"
        data-composition-id="03-outdoors"
        data-composition-src="compositions/frames/03-outdoors.html"
        data-start="9"
        data-duration="5.5"
        data-track-index="0"
      ></div>
      <audio
        id="el-03-outdoors-voice"
        src="assets/voice/03.wav"
        data-start="9"
        data-duration="5"
        data-track-index="10"
        data-volume="1"
      ></audio>

      <div
        id="el-04-range"
        class="scene"
        data-composition-id="04-range"
        data-composition-src="compositions/frames/04-range.html"
        data-start="14"
        data-duration="5.9"
        data-track-index="1"
      ></div>
      <audio
        id="el-04-range-voice"
        src="assets/voice/04.wav"
        data-start="14"
        data-duration="5.5"
        data-track-index="10"
        data-volume="1"
      ></audio>

      <div
        id="el-05-promise"
        class="scene"
        data-composition-id="05-promise"
        data-composition-src="compositions/frames/05-promise.html"
        data-start="19.5"
        data-duration="3"
        data-track-index="0"
      ></div>
      <audio
        id="el-05-promise-voice"
        src="assets/voice/05.wav"
        data-start="19.5"
        data-duration="2.5"
        data-track-index="10"
        data-volume="1"
      ></audio>

      <div
        id="el-06-cta"
        class="scene"
        data-composition-id="06-cta"
        data-composition-src="compositions/frames/06-cta.html"
        data-start="22"
        data-duration="5"
        data-track-index="1"
      ></div>
      <audio
        id="el-06-cta-voice"
        src="assets/voice/06.wav"
        data-start="22"
        data-duration="5"
        data-track-index="10"
        data-volume="1"
      ></audio>

      <!-- BGM -->
      <audio
        id="el-bgm"
        src="assets/bgm/track.mp3"
        data-start="0"
        data-duration="27"
        data-track-index="11"
        data-volume="0.12"
      ></audio>

      <!-- captions -->
      <div
        id="el-captions"
        class="scene"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="27"
        data-track-index="2"
      ></div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
      // ── frame transitions (injected by transitions.mjs) ──
      (function () { var tl = window.__timelines["main"];
        tl.to("#el-01-hook", { filter: "blur(10px)", scale: 1.03, opacity: 0, duration: 0.6, ease: "power2.inOut" }, 4);
        tl.fromTo("#el-02-indoors", { filter: "blur(10px)", scale: 0.97, opacity: 0 }, { filter: "blur(0px)", scale: 1, opacity: 1, duration: 0.6, ease: "power2.inOut" }, 4);
        tl.to("#el-02-indoors", { filter: "blur(10px)", scale: 1.03, opacity: 0, duration: 0.6, ease: "power2.inOut" }, 9);
        tl.fromTo("#el-03-outdoors", { filter: "blur(10px)", scale: 0.97, opacity: 0 }, { filter: "blur(0px)", scale: 1, opacity: 1, duration: 0.6, ease: "power2.inOut" }, 9);
        tl.to("#el-03-outdoors", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 14);
        tl.fromTo("#el-04-range", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 14);
        tl.to("#el-04-range", { scaleX: 0, transformOrigin: "left center", duration: 0.4, ease: "power3.inOut" }, 19.5);
        tl.fromTo("#el-05-promise", { scaleX: 0, transformOrigin: "right center", opacity: 1 }, { scaleX: 1, transformOrigin: "right center", duration: 0.4, ease: "power3.inOut" }, 19.5);
        tl.to("#el-05-promise", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 22);
        tl.fromTo("#el-06-cta", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 22);
        tl.to({}, { duration: 27 }, 0); // full-span anchor — main.duration() == composition total (Studio master duration)
      })();
    </script>
  </body>
</html>
